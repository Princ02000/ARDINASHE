<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ardinash Consultancy</title>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the intended path and redirects to the root index
      var path = window.location.pathname.replace("/ARDINASHE", "") || "/";
      if (path && path !== "/" && path.indexOf(".") === -1) {
        sessionStorage.setItem("spa_redirect", path);
      }
      window.location.replace("/ARDINASHE/");
    </script>
  </head>
  <body>
    <p>Redirecting to Ardinash Consultancy...</p>
  </body>
</html>
